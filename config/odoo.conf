[options]
; ============================================
; Odoo Server Configuration
; ============================================

; --- Database ---
db_host = postgres
db_port = 5432
db_user = odoo
db_password = odoo_dev_2024
db_name = False
db_filter = 

; --- Paths ---
addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo

; --- Server ---
http_port = 8069
proxy_mode = False

; --- Logging (development-friendly) ---
log_level = info
log_handler = :INFO

; --- Development ---
; Reload modules on code change (set to True during active development)
; dev_mode = reload,qweb,xml

; --- Performance ---
workers = 0
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; --- Security ---
admin_passwd = admin_master_pwd
list_db = True
